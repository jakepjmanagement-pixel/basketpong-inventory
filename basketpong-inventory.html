<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BasketPong — Inventory Forecast</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--bg2:#ffffff;--bg3:#edecea;--bg4:#e4e2de;
  --text:#1c1b18;--text2:#6b6963;--text3:#a09d97;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --green:#1a9268;--green-bg:#e2f4ed;--green-text:#0a5c40;
  --amber:#d4860f;--amber-bg:#fef3dc;--amber-text:#7a4d08;
  --red:#c94040;--red-bg:#fceaea;--red-text:#7a1f1f;
  --blue:#2d6fbf;--blue-bg:#e8f0fb;--blue-text:#1a4580;
  --r:8px;--rlg:14px;
  --mono:'Courier New',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181714;--bg2:#222018;--bg3:#2a2824;--bg4:#32302b;
  --text:#f0ede6;--text2:#9c9890;--text3:#5c5a54;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --green:#2ab87e;--green-bg:#0a3d28;--green-text:#6ddbb0;
  --amber:#e8a020;--amber-bg:#3d2800;--amber-text:#f5c56a;
  --red:#e05555;--red-bg:#3d1010;--red-text:#f09090;
  --blue:#5590e0;--blue-bg:#0d2545;--blue-text:#90b8f0;
}}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:1020px;margin:0 auto;padding:28px 20px 80px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.topbar h1{font-size:20px;font-weight:600;letter-spacing:-.3px}
.topbar .sub{font-size:12px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.data-pill{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-family:var(--mono);white-space:nowrap}
.data-pill.live{border-color:var(--green);color:var(--green-text);background:var(--green-bg)}
.alert-strip{border-radius:var(--r);padding:11px 16px;margin-bottom:12px;font-size:13px;font-weight:500}
.alert-strip.danger{background:var(--red-bg);color:var(--red-text);border:0.5px solid var(--red)}
.alert-strip.warn{background:var(--amber-bg);color:var(--amber-text);border:0.5px solid var(--amber)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:24px}
.metric{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:14px 16px}
.metric .lbl{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.metric .val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-1px}
.metric .hint{font-size:11px;color:var(--text3);margin-top:3px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tabs button{background:none;border:none;font-size:13px;color:var(--text2);cursor:pointer;padding:8px 16px;border-radius:var(--r) var(--r) 0 0;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tabs button.active{color:var(--text);font-weight:500;border-bottom-color:var(--text)}
.tabs button:hover:not(.active){color:var(--text);background:var(--bg3)}
.section{display:none}.section.active{display:block}
.sku-grid{display:flex;flex-direction:column;gap:14px}
.sku-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.sku-card.s-danger{border-top:3px solid var(--red)}.sku-card.s-warn{border-top:3px solid var(--amber)}
.sku-card.s-ok{border-top:3px solid var(--green)}.sku-card.s-nodata{border-top:3px solid var(--text3)}
.sku-body{padding:18px 20px}
.sku-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.sku-name{font-size:15px;font-weight:600}
.sku-code{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge.ok{background:var(--green-bg);color:var(--green-text)}
.badge.warn{background:var(--amber-bg);color:var(--amber-text)}
.badge.danger{background:var(--red-bg);color:var(--red-text)}
.badge.nodata{background:var(--bg3);color:var(--text2)}
.badge.info{background:var(--blue-bg);color:var(--blue-text)}
.stat-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:16px}
@media(max-width:600px){.stat-row{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--bg3);border-radius:var(--r);padding:10px 8px;text-align:center}
.stat .sv{font-size:16px;font-weight:700;font-family:var(--mono)}
.stat .sl{font-size:10px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
.chart-section{margin-bottom:16px}
.chart-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.month-bars{display:flex;align-items:flex-end;gap:2px;height:90px}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
.bar-wrap{flex:1;display:flex;align-items:flex-end;width:100%}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar.hist{background:var(--bg4)}.bar.proj{background:var(--blue);opacity:.75}.bar.curr{background:var(--amber)}
.mlbl{font-size:8px;color:var(--text3);font-family:var(--mono);text-align:center;overflow:hidden;width:100%}
.proj-box{background:var(--bg3);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.proj-text{font-size:13px;line-height:1.6}
.proj-text strong{font-weight:600}
.proj-sub{font-size:11px;color:var(--text2);margin-top:2px}
.btn{font-size:12px;padding:7px 14px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:background .15s}
.btn:hover{background:var(--bg3)}
.btn.primary{background:var(--text);color:var(--bg);border-color:transparent}

.import-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:560px){.import-grid{grid-template-columns:1fr}}
.drop-zone{background:var(--bg2);border:1.5px dashed var(--border2);border-radius:var(--rlg);padding:30px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--blue);background:var(--blue-bg)}
.drop-zone.loaded{border-style:solid;border-color:var(--green);background:var(--green-bg)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:28px;margin-bottom:10px}
.drop-title{font-size:14px;font-weight:600;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text2);margin-bottom:5px}
.drop-hint{font-size:11px;color:var(--text3);font-family:var(--mono)}
.drop-status{font-size:12px;font-weight:600;color:var(--green-text);margin-top:8px}
.instr{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:20px;margin-bottom:16px}
.instr h3{font-size:13px;font-weight:600;margin-bottom:14px}
.step{display:flex;gap:12px;margin-bottom:12px;font-size:13px}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

code{background:var(--bg3);padding:1px 6px;border-radius:4px;font-size:12px;font-family:var(--mono)}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);overflow:hidden;margin-bottom:16px}
.card-hdr{padding:13px 18px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3)}
.card-title{font-size:14px;font-weight:600}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{text-align:left;padding:9px 14px;font-size:10px;font-weight:600;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
table.dt td{padding:11px 14px;border-bottom:0.5px solid var(--border);color:var(--text)}

.po-form{padding:16px 18px;background:var(--bg3);border-top:0.5px solid var(--border)}
.po-form h4{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--text2);font-weight:500}
.form-group input,.form-group select{font-size:13px;padding:7px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit}

.cf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.cf-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:16px}
.cf-mo{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-family:var(--mono)}
.cf-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px}
.cf-lbl{width:60px;color:var(--text2);flex-shrink:0}
.cf-bar-wrap{flex:1;height:20px;background:var(--bg3);border-radius:3px;overflow:hidden}
.cf-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:600;white-space:nowrap;font-family:var(--mono)}
.cf-fill.rev{background:var(--green);color:var(--green-bg)}
.cf-fill.po{background:#b06040;color:#fff5f0}
.cf-net{text-align:right;font-size:12px;font-weight:700;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);font-family:var(--mono)}
.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.set-grid{grid-template-columns:1fr}}
.set-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--rlg);padding:16px 18px}
.set-card h3{font-size:13px;font-weight:600;margin-bottom:14px}

.sku-set-name{font-size:13px;font-weight:600;margin-bottom:8px}
.sku-set-r{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sku-set-r label{font-size:11px;color:var(--text2);min-width:95px}
.sku-set-r input{padding:5px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-family:var(--mono);font-size:12px}
.note{font-size:11px;color:var(--text3);line-height:1.6;margin-top:8px}
</style>
</head>

  const amz=AMAZON[sku]||{};
  const shp=SHOPIFY[sku]||{};
  const months=new Set([...Object.keys(amz),...Object.keys(shp)]);
  for(const m of months){
    HISTORY[sku][m]=(amz[m]||0)+(shp[m]||0);
  }
}

let POS=[];
let dataLoaded={shopify:true,amazon:true};

// ── FORECASTING ENGINE ──────────────────────────────────────────────────────
function mk(y,m){return `${y}-${String(m+1).padStart(2,'0')}`;}
// For bp02 H2O: Amazon history is stockout-distorted (ran out repeatedly in 2025).
// Use Shopify as the true demand signal for forecasting.
const SHOPIFY_ONLY_FORECAST=['bp02'];

function hist(id){
  if(SHOPIFY_ONLY_FORECAST.includes(id)) return SHOPIFY[id]||{};
  return HISTORY[id]||{};
}

function histCombined(id){return HISTORY[id]||{};} // for display/charts only

function yearTotal(id,y){
  const h=hist(id); let t=0;
  for(let m=0;m<12;m++) t+=h[mk(y,m)]||0;
  return t;
}

function yoyGrowth(id){
  if(CFG.yoyOverride!==null) return CFG.yoyOverride;
  const now=new Date(), yr=now.getFullYear();
  const t1=yearTotal(id,yr-2), t2=yearTotal(id,yr-1);
  if(!t1||!t2) return 0.10;
  return Math.min(Math.max((t2-t1)/t1,-0.30),1.00);
}

function projectMonth(id,y,m){
  const h=hist(id);
  const ly=h[mk(y-1,m)]||0;
  if(ly) return Math.round(ly*(1+yoyGrowth(id)));
  const ly2=h[mk(y-2,m)]||0;
  if(ly2) return Math.round(ly2*Math.pow(1+yoyGrowth(id),2));
  return null;
}

function projectDays(id,days){
  const now=new Date(); let total=0,hasData=false;
  let cursor=new Date(now);
  const end=new Date(now); end.setDate(end.getDate()+days);
  while(cursor<end){
    const y=cursor.getFullYear(),m=cursor.getMonth();
    const dim=new Date(y,m+1,0).getDate();
    const frac=Math.min((end-cursor)/86400000,dim-cursor.getDate()+1);
    const mu=projectMonth(id,y,m);
    if(mu!==null){total+=mu*(frac/dim);hasData=true;}
    cursor=new Date(y,m+1,1);
  }
  return hasData?Math.round(total):null;
}

function flatVel(sku){
  const h=hist(sku.id); const now=new Date(); let t=0,n=0;
  for(let i=1;i<=3;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const v=h[mk(d.getFullYear(),d.getMonth())];
    if(v){t+=v;n++;}
  }
  return n?t/(n*30.5):0;
}

function totalAvailable(sku){
  // FBA stock + FBA inbound = 100% (already in Amazon's system)
  // Boats to NJ/FBA = 100% (committed ETA)
  // China WH = 50% (paid but no ship date committed)
  return (sku.fbaStock||0) + (sku.fbaInbound||0) + sku.onHand + sku.boatToNJ + sku.boatToFBA + Math.round((sku.chinaWH||0)*0.5);
}
function fullPipeline(sku){
  return (sku.fbaStock||0) + (sku.fbaInbound||0) + sku.onHand + (sku.onOrder||0) + (sku.chinaWH||0) + sku.boatToNJ + sku.boatToFBA;
}
function daysOfStock(sku){
  const stock=totalAvailable(sku);
  const hasHist=Object.keys(hist(sku.id)).length>0;
  if(!hasHist){
    const v=flatVel(sku);
    return {days:v>0?Math.round(stock/v):999,projected:false};
  }
  // binary search: how many days until projected demand exceeds stock
  let lo=0,hi=500;
  for(let i=0;i<30;i++){
    const mid=Math.round((lo+hi)/2);
    const d=projectDays(sku.id,mid);
    if(d===null){const v=flatVel(sku);return {days:v>0?Math.round(stock/v):999,projected:false};}
    if(d<stock)lo=mid; else hi=mid;
  }
  return{days:Math.round((lo+hi)/2),projected:true};
}

function reorderQty(sku){
  const needed=projectDays(sku.id,CFG.leadDays+CFG.targetCoverDays+CFG.safetyDays);
  if(needed===null) return null;
  return Math.max(0,needed-totalAvailable(sku));
}
function channelBreakdown(sku,qty){
  const amzFrac=sku.channelSplit||0;
  const fba=Math.round(qty*amzFrac);
  const nj=qty-fba;
  return{fba,nj,amzPct:Math.round(amzFrac*100),njPct:Math.round((1-amzFrac)*100)};
}

function daysUntilOrder(sku){
  const {days}=daysOfStock(sku);
  return Math.max(0,days-CFG.leadDays-CFG.safetyDays);
}

function statusFor(sku){
  if(!Object.keys(hist(sku.id)).length) return 'nodata';
  const {days}=daysOfStock(sku);
  if(days<CFG.leadDays) return 'danger';
  if(days<CFG.leadDays+CFG.safetyDays+14) return 'warn';
  return 'ok';
}

function chartData(id){
  const now=new Date(); const pts=[];
  for(let i=-11;i<=6;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const y=d.getFullYear(),m=d.getMonth(),key=mk(y,m);
    const actual=histCombined(id)?histCombined(id)[key]||null:null;
    const proj=projectMonth(id,y,m);
    const isFut=i>0,isCur=i===0;
    const lbl=d.toLocaleDateString('en-US',{month:'short'}).slice(0,3)+(m===0||i===-11||i===6?`'${String(y).slice(2)}`:'');
    pts.push({lbl,actual:isFut?null:actual,proj:isFut||isCur?proj:null,isFut,isCur});
  }
  return pts;
}

// ── CSV PARSERS ─────────────────────────────────────────────────────────────
function csvLine(l){
  const r=[];let c='',q=false;
  for(let i=0;i<l.length;i++){
    if(l[i]==='"')q=!q;
    else if(l[i]===','&&!q){r.push(c);c='';}
    else c+=l[i];
  }
  r.push(c);return r;
}

function parseShopify(text){
  const lines=text.trim().split('\n');
  const hdr=csvLine(lines[0]).map(h=>h.trim().toLowerCase());
  const si=hdr.indexOf('lineitem sku'),qi=hdr.indexOf('lineitem quantity'),di=hdr.indexOf('created at');
  if(si===-1||qi===-1||di===-1){alert('Shopify CSV missing columns. Export from Orders \u2192 Export.');return false;}
  SKUS.forEach(s=>{if(!HISTORY[s.id])HISTORY[s.id]={};});
  let rows=0;
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=csvLine(lines[i]);
    const d=new Date(c[di]||'');if(isNaN(d))continue;
    const key=mk(d.getFullYear(),d.getMonth());
    const sc=(c[si]||'').trim().toUpperCase();
    const qty=parseInt(c[qi])||0;
    if(!sc||!qty)continue;
    SKUS.forEach(s=>{
      if(sc===s.code||sc.startsWith(s.code)){
        HISTORY[s.id][key]=(HISTORY[s.id][key]||0)+qty;rows++;
      }
    });
  }
  return rows>0;
}

function parseAmazon(text){
  const lines=text.trim().split('\n');
  const delim=lines[0].includes('\t')?'\t':',';
  const sp=l=>delim==='\t'?l.split('\t').map(c=>c.trim().replace(/^"|"$/g,'')):csvLine(l);
  const hdr=sp(lines[0]).map(h=>h.toLowerCase().trim());
  const di=hdr.findIndex(h=>h==='date'||h.startsWith('date'));
  const ai=hdr.findIndex(h=>h.includes('asin'));
  const ski=hdr.findIndex(h=>h==='sku'||h.includes('seller sku'));
  const ui=hdr.findIndex(h=>h.includes('units ordered')||h.includes('units sold'));
  if(ui===-1){alert('Could not find "Units Ordered". Use the Detail Page Sales and Traffic by Child Item report.');return false;}
  SKUS.forEach(s=>{if(!HISTORY[s.id])HISTORY[s.id]={};});
  let rows=0;
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const c=sp(lines[i]);
    const d=new Date(c[di]||'');if(isNaN(d))continue;
    const key=mk(d.getFullYear(),d.getMonth());
    const asin=(ai>=0?c[ai]:'').trim();
    const sku=(ski>=0?c[ski]:'').trim().toUpperCase();
    const units=parseInt((c[ui]||'').replace(/[^0-9]/g,''))||0;
    if(!units)continue;
    SKUS.forEach(s=>{
      if((asin&&asin===s.asin&&s.asin)||(sku&&(sku===s.code||sku.startsWith(s.code)))){
        HISTORY[s.id][key]=(HISTORY[s.id][key]||0)+units;rows++;
      }
    });
  }
  return rows>0;
}

// ── HELPERS ─────────────────────────────────────────────────────────────────
function fd(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function skuById(id){return SKUS.find(s=>s.id===id)||{};}

function renderMetrics(){

  const totalNJ=SKUS.reduce((a,s)=>a+s.onHand,0);
  const totalPipeline=SKUS.reduce((a,s)=>a+(s.fbaInbound||0)+(s.chinaWH||0)+s.boatToNJ+s.boatToFBA+(s.onOrder||0),0);
  const totalFBA=SKUS.reduce((a,s)=>a+(s.fbaStock||0),0);

  const vc=critical>0?'color:var(--red)':needsAction>0?'color:var(--amber)':'color:var(--green)';
  document.getElementById('metrics').innerHTML=`

    splitHtml='<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">'

}

      <button class="btn primary" onclick="saveManual()">Save manual data</button>
      <div style="font-size:12px;color:var(--text2)">Enter combined (Shopify + Amazon) units sold per SKU per month.</div>
    </div>
  </div>`;

  // Build 24-month manual entry grid
  const now=new Date(); let rows='';
  for(let i=23;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=mk(d.getFullYear(),d.getMonth());
    const lbl=d.toLocaleDateString('en-US',{month:'short',year:'numeric'});
    rows+=`<tr><td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${lbl}</td>${SKUS.map(s=>`<td><input type="number" data-key="${key}" data-sku="${s.id}" value="${hist(s.id)[key]||''}" placeholder="0"/></td>`).join('')}</tr>`;
  }
  document.getElementById('manual-body').innerHTML=rows;

  // Drag events
  [['s-drop','shopify'],['a-drop','amazon']].forEach(([id,ch])=>{
    const el=document.getElementById(id);if(!el)return;
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0],ch);});
  });
}

function saveManual(){
  document.querySelectorAll('#manual-body input').forEach(inp=>{
    const key=inp.dataset.key,id=inp.dataset.sku,v=parseInt(inp.value)||0;
    if(!HISTORY[id])HISTORY[id]={};
    if(v>0)HISTORY[id][key]=v; else delete HISTORY[id][key];
  });
  updatePill();renderAll();
}

function handleFile(e,ch){const f=e.target.files[0];if(f)processFile(f,ch);}
function processFile(file,ch){
  const r=new FileReader();
  r.onload=e=>{
    const ok=ch==='shopify'?parseShopify(e.target.result):parseAmazon(e.target.result);
    if(ok){dataLoaded[ch]=true;dataLoaded[ch+'File']=file.name;}
    else alert(`No matching SKUs found. Check that your Shopify SKU field contains BP01/BP02/BP05/BP06, or set ASINs in Settings for Amazon matching.`);
    updatePill();renderAll();
  };
  r.readAsText(file);
}

function updatePill(){
  const el=document.getElementById('data-pill');
  const has=SKUS.some(s=>Object.keys(hist(s.id)).length>0);
  if(has){
    el.className='data-pill live';
    const src=[];
    if(dataLoaded.amazon)src.push('Amazon');
    if(dataLoaded.shopify)src.push('Shopify');
    if(!src.length)src.push('Manual');
    el.textContent=src.join(' + ')+' \u00b7 '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }else{el.className='data-pill';el.textContent='No sales data loaded';}
}

let prePO={};
function prefillPO(id,qty){prePO={id,qty};showTab('pos',document.querySelectorAll('.tabs button')[2]);}

function renderPOs(){

  <div class="card">

    <div style="overflow-x:auto"><table class="dt"><thead><tr><th>PO #</th><th>SKU</th><th>Units</th><th>COGS</th><th>Total</th><th>Order date</th><th>ETA</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="po-form">
      <h4>Log new purchase order</h4>
      <div class="form-row">
        <div class="form-group"><label>SKU</label><select id="po-sku">${SKUS.map(s=>`<option value="${s.id}"${s.id===pSkuId?' selected':''}>${s.name}</option>`).join('')}</select></div>
        <div class="form-group"><label>Units</label><input type="number" id="po-units" value="${prePO.qty||''}" placeholder="500"/></div>
        <div class="form-group"><label>Unit COGS ($)</label><input type="number" id="po-cogs" value="${pSku.cogs||''}" step="0.01"/></div>
        <div class="form-group"><label>Order date</label><input type="date" id="po-date" value="${today}"/></div>
        <div class="form-group"><label>ETA (NJ arrival)</label><input type="date" id="po-eta" value="${etaDef}"/></div>
        <div class="form-group"><label>Status</label><select id="po-status"><option value="confirmed">Confirmed</option><option value="in transit">In transit</option><option value="received">Received</option></select></div>
      </div>

    </div>
  </div>`;
  prePO={};
}

function addPO(){
  const skuId=document.getElementById('po-sku').value;
  const units=parseInt(document.getElementById('po-units').value)||0;
  const cogs=parseFloat(document.getElementById('po-cogs').value)||0;
  const orderDate=document.getElementById('po-date').value;
  const eta=document.getElementById('po-eta').value;
  const status=document.getElementById('po-status').value;
  if(!units||!cogs){alert('Enter units and COGS.');return;}
  POS.push({id:'PO-2026-'+String(POS.length+1).padStart(3,'0'),skuId,units,cogs,orderDate,eta,status});
  if(status==='in transit'){const s=SKUS.find(x=>x.id===skuId);if(s){s.boatToNJ+=units;s.boatToNJeta=eta;}}
  saveState();
  renderAll();
}

function renderCashFlow(){
  const now=new Date();
  const months=Array.from({length:6},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()+i,1);return{lbl:d.toLocaleDateString('en-US',{month:'long',year:'numeric'}),y:d.getFullYear(),m:d.getMonth()};});
  const poByMo={};
  POS.forEach(po=>{const d=new Date(po.orderDate);const k=mk(d.getFullYear(),d.getMonth());poByMo[k]=(poByMo[k]||0)+po.units*po.cogs;});
  const cards=months.map(mo=>{
    const k=mk(mo.y,mo.m);
    const rev=SKUS.reduce((a,s)=>{const p=projectMonth(s.id,mo.y,mo.m);return a+(p?p*s.price:0);},0);
    const out=poByMo[k]||0;
    const net=rev-out;
    const mx=Math.max(rev,out,1);
    return`<div class="cf-card">
      <div class="cf-mo">${mo.lbl}</div>
      <div class="cf-row"><div class="cf-lbl">Revenue</div><div class="cf-bar-wrap"><div class="cf-fill rev" style="width:${rev?Math.round(rev/mx*100):0}%">${rev?'$'+(rev/1000).toFixed(0)+'k':''}</div></div></div>
      <div class="cf-row"><div class="cf-lbl">PO payments</div><div class="cf-bar-wrap">${out?`<div class="cf-fill po" style="width:${Math.round(out/mx*100)}%">$${(out/1000).toFixed(0)}k</div>`:`<div style="padding:3px 8px;font-size:10px;color:var(--text3)">none</div>`}</div></div>
      <div class="cf-net" style="color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':''}$${net.toLocaleString(undefined,{maximumFractionDigits:0})}</div>
    </div>`;
  }).join('');
  document.getElementById('cashflow').innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span style="font-size:12px;color:var(--text2)">Projected revenue (units \u00d7 sell price)</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#b06040"></div><span style="font-size:12px;color:var(--text2)">PO payments (by order date)</span></div>
    </div>
    <div class="cf-grid">${cards}</div>
    <div class="note" style="padding:11px 14px;background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--border)">Revenue is projected units \u00d7 selling price. Adjust for channel fees and returns. PO payments shown on order date \u2014 adjust for your supplier payment terms if different.</div>`;
}

    <button class="btn" onclick="if(confirm('Reset all inventory to defaults? This will clear shared data for everyone.')){localStorage.removeItem(LOCAL_KEY);localStorage.removeItem('bp_jsonbin_id');BIN_ID=null;SKUS=SKU_DEFAULTS.map(s=>({...s}));CFG={leadDays:70,safetyDays:21,targetCoverDays:150,yoyOverride:null};POS=[];renderAll();}">Reset to defaults</button>

        <div class="sku-set-r"><label>Sell price ($)</label><input type="number" value="${s.price}" step="0.01" style="width:80px" onchange="updateField('${s.id}','price',+this.value)"/></div>

// ── SHARED SYNC via JSONBin ──────────────────────────────────────────────────
const JSONBIN_KEY='$2a$10$V/4mx1w.JvNII6.qT6r3xubrQXX/Ikh99yTsE7oIzqZm.V/4DrUeu';
const JSONBIN_URL='https://api.jsonbin.io/v3/b';
const LOCAL_KEY='bp_inventory_v3';
let BIN_ID=localStorage.getItem('bp_jsonbin_id')||null;
let lastSavedAt=null;
let syncTimer=null;
let polling=null;

function getState(){
  return{
    cfg:{...CFG},
    skus:SKUS.map(s=>({
      id:s.id,cogs:s.cogs,price:s.price,
      onHand:s.onHand,fbaStock:s.fbaStock,fbaInbound:s.fbaInbound,
      chinaWH:s.chinaWH,boatToNJ:s.boatToNJ,boatToNJeta:s.boatToNJeta,
      boatToFBA:s.boatToFBA,boatToFBAeta:s.boatToFBAeta,
      channelSplit:s.channelSplit,onOrder:s.onOrder
    })),
    pos:POS,
    savedAt:new Date().toISOString()
  };
}

function applyState(state){
  if(!state)return false;
  if(state.cfg)Object.assign(CFG,state.cfg);
  if(state.skus)state.skus.forEach(saved=>{
    const s=SKUS.find(x=>x.id===saved.id);
    if(s)Object.assign(s,saved);
  });
  if(state.pos)POS=state.pos;
  if(state.savedAt)lastSavedAt=state.savedAt;
  return true;
}

function setPill(status,detail){
  const el=document.getElementById('sync-pill');
  if(!el)return;
  const styles={
    synced:'border-color:var(--green);color:var(--green-text);background:var(--green-bg)',
    saving:'border-color:var(--amber);color:var(--amber-text);background:var(--amber-bg)',
    error:'border-color:var(--red);color:var(--red-text);background:var(--red-bg)',
    local:'',
  };
  el.style.cssText=styles[status]||'';
  el.textContent=detail;
}

async function saveToCloud(){
  const state=getState();
  localStorage.setItem(LOCAL_KEY,JSON.stringify(state));
  setPill('saving','Saving...');
  try{
    let res,data;
    if(!BIN_ID){
      // Create new bin
      res=await fetch(JSONBIN_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'BP Inventory','X-Bin-Private':'false'},
        body:JSON.stringify(state)
      });
      data=await res.json();
      BIN_ID=data.metadata&&data.metadata.id;
      if(BIN_ID){localStorage.setItem('bp_jsonbin_id',BIN_ID);}
    } else {
      // Update existing bin
      res=await fetch(JSONBIN_URL+'/'+BIN_ID,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
        body:JSON.stringify(state)
      });
      data=await res.json();
    }
    lastSavedAt=state.savedAt;
    const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    setPill('synced','✓ Synced · '+t);
  }catch(e){
    setPill('error','Cloud save failed — local only');
  }
}

async function loadFromCloud(){
  setPill('local','Connecting...');
  // Check if teammates shared a bin ID via URL param
  const params=new URLSearchParams(window.location.search);
  const paramBin=params.get('bin');
  if(paramBin&&!BIN_ID){BIN_ID=paramBin;localStorage.setItem('bp_jsonbin_id',paramBin);}

  if(!BIN_ID){
    // Try local storage fallback
    try{
      const raw=localStorage.getItem(LOCAL_KEY);
      if(raw){applyState(JSON.parse(raw));setPill('local','Local data');}
      else setPill('local','Default data');
    }catch(e){setPill('local','Default data');}
    return;
  }
  try{
    const res=await fetch(JSONBIN_URL+'/'+BIN_ID+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const data=await res.json();
    if(data.record){
      applyState(data.record);
      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      setPill('synced','✓ Synced · '+t);
    }
  }catch(e){
    try{
      const raw=localStorage.getItem(LOCAL_KEY);
      if(raw)applyState(JSON.parse(raw));
    }catch(e2){}
    setPill('error','Cloud load failed — local data');
  }
}

async function pollForUpdates(){
  if(!BIN_ID)return;
  try{
    const res=await fetch(JSONBIN_URL+'/'+BIN_ID+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    const data=await res.json();
    if(data.record&&data.record.savedAt&&data.record.savedAt!==lastSavedAt){
      applyState(data.record);
      renderAll();
      const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      setPill('synced','✓ Updated · '+t);
    }
  }catch(e){}
}

function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(saveToCloud,1000);
}

function updateField(id,field,val){
  const s=SKUS.find(x=>x.id===id);
  if(s){s[field]=val;scheduleSave();updateForecastIfVisible();}
}
function updateCFG(field,val){
  CFG[field]=val;scheduleSave();updateForecastIfVisible();
}
function updateForecastIfVisible(){
  renderAlerts();renderMetrics();
  const a=document.querySelector('.section.active');
  if(a&&a.id!=='settings'&&a.id!=='import')renderSection(a.id);
}
function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn)btn.classList.add('active');
  renderSection(id);
}
function renderSection(id){
  if(id==='forecast')renderForecast();
  else if(id==='import')renderImport();
  else if(id==='pos')renderPOs();
  else if(id==='cashflow')renderCashFlow();
  else if(id==='settings')renderSettings();
}
function renderAll(){
  renderAlerts();renderMetrics();
  const a=document.querySelector('.section.active');
  if(a)renderSection(a.id);
}

// Update settings header to show bin share link
const _origRenderSettings=renderSettings;
function renderSettings(){
  _origRenderSettings();
  // Inject share link info at top of settings if we have a bin ID
  if(BIN_ID){
    const shareUrl=window.location.href.split('?')[0]+'?bin='+BIN_ID;
    const el=document.getElementById('settings');
    const info=document.createElement('div');
    info.style.cssText='background:var(--blue-bg);color:var(--blue-text);border:0.5px solid var(--blue);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:14px';
    info.innerHTML='<strong>Share link for your team:</strong><br><code style="font-size:11px;word-break:break-all">'+shareUrl+'</code>';
    el.insertBefore(info,el.firstChild);
  }
}

loadFromCloud().then(()=>{
  renderAll();
  polling=setInterval(pollForUpdates,30000);
});
</script>
